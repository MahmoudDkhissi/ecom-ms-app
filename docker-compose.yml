services:
  # --- EUREKA DISCOVERY SERVICE ---
  discovery-service:
    build: ./discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - mdk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- CONFIG SERVICE ---
  config-service:
    build: ./config-service
    container_name: config-service
    ports:
      - "9999:9999"
    environment:
      # On lui dit de s'enregistrer aussi sur Eureka
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - mdk-network

  # --- KEYCLOAK SERVICE ---
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.0
    container_name: keycloak
    ports:
      - "8080:8080"
    environment:
      # Admin credentials
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin123
      
      # H2 Database Configuration with file persistence
      - KC_DB=dev-file

      # Keycloak proxy settings for proper URL handling
      - KC_PROXY=edge
      
      # Log level
      - KC_LOG_LEVEL=INFO
    command:
      - "start-dev"
    volumes:
      # Volume pour persister la base de données H2
      - keycloak_data:/opt/keycloak/data
    networks:
      - mdk-network
    depends_on:
      - discovery-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5



networks:
  mdk-network:
    driver: bridge

volumes:
  keycloak_data:

